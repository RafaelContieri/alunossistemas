    <style>
        /* CSS - ESTILIZAÇÃO */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            padding: 15px;
            color: #2c3e50;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #1e3799; margin-bottom: 5px; }
        header p { font-size: 0.9rem; color: #7f8c8d; }

        .dashboard-resumo, .dashboard-detalhado {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .card-stats {
            background: #f1f2f6;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 3px solid #4a69bd;
        }

        .card-secondary {
            background: #fff;
            border: 1px solid #d1d8e0;
            border-bottom: 3px solid #7f8c8d;
        }

        .card-stats span {
            display: block;
            font-size: 0.7rem;
            color: #7f8c8d;
            text-transform: uppercase;
            font-weight: bold;
        }

        .card-stats strong {
            font-size: 1.2rem;
            color: #1e3799;
        }

        .search-box input {
            width: 100%;
            padding: 14px;
            border: 2px solid #d1d8e0;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }

        .table-wrapper {
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid #d1d8e0;
        }

        table { width: 100%; border-collapse: collapse; background: #fff; min-width: 1100px; }
        th { background: #4a69bd; color: white; padding: 12px; text-align: left; font-size: 0.65rem; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f2f6; font-size: 0.8rem; }
        
        .badge-tipo {
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: bold;
            background: #e2e8f0;
        }

        .status-badge {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.65rem;
        }

        .status-pendente { color: #d63031; }
        .status-pago { color: #27ae60; }

        @media screen and (max-width: 768px) {
            thead { display: none; }
            table { min-width: 100%; }
            tr { display: block; border: 1px solid #e1e8f0; border-radius: 12px; margin-bottom: 10px; padding: 5px; }
            td { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #f1f2f6; text-align: right; }
            td:before { content: attr(data-label); font-weight: bold; color: #4a69bd; text-align: left; }
        }
    </style>
</head>

    function atualizarDashboard(listaFiltrada) {
        const totalPecas = listaFiltrada.reduce((acc, a) => acc + a.qtd, 0);
        const totalAlunos = new Set(listaFiltrada.map(a => a.nome)).size;
        const totalPolo = listaFiltrada.filter(a => a.tipo === "Polo").reduce((acc, a) => acc + a.qtd, 0);
        const totalMalha = listaFiltrada.filter(a => a.tipo === "Malha").reduce((acc, a) => acc + a.qtd, 0);
        const financeiro = listaFiltrada.reduce((acc, a) => acc + a.vlrTotal, 0);

        document.getElementById('totalPecas').innerText = totalPecas;
        document.getElementById('totalAlunos').innerText = totalAlunos;
        document.getElementById('totalPolo').innerText = totalPolo;
        document.getElementById('totalMalha').innerText = totalMalha;
        document.getElementById('financeiroTotal').innerText = financeiro.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function renderTable(lista) {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        lista.forEach(aluno => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td data-label="Nome"><strong>${aluno.nome}</strong></td>
                <td data-label="Modelo"><span class="badge-tipo">${aluno.tipo}</span></td>
                <td data-label="Tam.">${aluno.tamanho}</td>
                <td data-label="Qtd.">${aluno.qtd}</td>
                <td data-label="Nome Camisa">${aluno.nomePersonalizado}</td>
                <td data-label="Vlr. Unit">${aluno.vlrUnit.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</td>
                <td data-label="Vlr. Total">${aluno.vlrTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</td>
                <td data-label="Metade"><span class="status-badge ${aluno.pgMetade === 'Pago' ? 'status-pago' : 'status-pendente'}">${aluno.pgMetade}</span></td>
                <td data-label="Total"><span class="status-badge ${aluno.pgTotal === 'Pago' ? 'status-pago' : 'status-pendente'}">${aluno.pgTotal}</span></td>
            `;
            body.appendChild(row);
        });
        atualizarDashboard(lista);
    }

    document.getElementById('searchInput').addEventListener('keyup', (e) => {
        const busca = e.target.value.toLowerCase();
        const filtrados = alunos.filter(a => a.nome.toLowerCase().includes(busca));
        renderTable(filtrados);
    });
